<!-- Placeholder for child template CSS declarations -->
    <link href="{{site.data.info.assets}}assets/css/hl7.css" rel="stylesheet"/>
    <link href="{{site.data.info.assets}}assets/css/fhir.css" rel="stylesheet"/>

    <style>
    {% if site.data.features.css.navbar %}
    .navbar-inverse {
        background-color: #{{site.data.features.css.navbar}};
    }

    #segment-footer .container {
      background-color: #{{site.data.features.css.navbar}};
    }
    {% endif %}

    {% if site.data.features.css.hover %}
    .navbar-inverse .navbar-nav li a:hover {
      background-color: #{{site.data.features.css.hover}};
    }
    {% endif %}

    {% if site.data.features.css.title %}
    #ig-status {
      color: #{{site.data.features.css.title}};
    }
    {% endif %}

    /* UMZH corporate style */

    /* Header: light gray background (#f5f5f5) with near-black text — matches umzh.uzh.ch */
    #segment-header {
        background-color: #f5f5f5;
    }
    #segment-header > .container {
        background-color: #f5f5f5;
    }
    #ig-status {
        color: #111111;
    }

    /* Hide top stripe */
    #stripe {
	background: #111111;
    }

    /* Navbar: UMZH blue */
    .navbar-inverse {
        background-color: #0000ff;
    }
    .navbar-inverse .navbar-nav > li > a:hover,
    .navbar-inverse .navbar-nav > li > a:focus {
        background-color: #111111;
    }
    .navbar-inverse .navbar-nav > .open > a,
    .navbar-inverse .navbar-nav > .open > a:hover,
    .navbar-inverse .navbar-nav > .open > a:focus {
        background-color: #111111;
    }
    #segment-footer > .container {
        background-color: #0000ff;
    }

    /* Informative Implementation Note callout — calm, non-warning */
    .impl-note {
        margin: 1em 0;
        padding: 12px 16px;
        background-color: #f5f7fa;          /* light neutral */
        border-left: 4px solid #0000ff;     /* UMZH blue accent */
        border-radius: 3px;
    }
    .impl-note::before {
        content: "Implementation Note";
        display: block;
        font-weight: bold;
        color: #0000ff;
        margin-bottom: 4px;
    }

    </style>
